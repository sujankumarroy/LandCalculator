<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Land Calculator — History</title>
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/history.css">
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <h1 class="brand">Land Calculator</h1>
            <nav class="nav">
                <a href="/" class="nav-link">Calculator</a>
                <a href="/history" class="nav-link active">History</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card glass card--padded">
            <div class="row" style="justify-content:space-between;align-items:center;">
                <h2>Saved Calculations</h2>
                <div>
                    <button id="exportBtn" class="btn btn--outline" onclick="exportHistory()">Export History</button>
                    <button id="clearHistoryBtn" class="btn btn--ghost" onclick="clearHistory()">Clear History</button>
                </div>
            </div>

            <br>
            <div id="historyList" class="history-list" style="margin-top:12px;">
                <!-- entries appended here -->
            </div>
        </section>
    </main>

    <div id="modal" class="modal" style="display:none;">
        <div class="modal-card">
            <button id="closeModal" class="modal-close">×</button>
            <pre id="modalBody" class="modal-body"></pre>
        </div>
    </div>

    <footer class="footer">
        <div class="container muted small">History stored in your browser (localStorage)</div>
    </footer>

    <div id="toast" class="toast" style="display:none;"></div>

    <script src="js/history.js"></script>
</body>
</html>
